<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bitácora de Alianza Terapéutica</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

:root {
  --paper: #EDE9DE;
  --paper-2: #F5F2EA;
  --ink: #24303B;
  --ink-light: #6B7178;
  --line: #D8D2C2;
  --ors: #8A6A3F;
  --srs: #4E6E64;
  --alert: #A6432E;
  --radius: 10px;
}
* { box-sizing: border-box; }
body { margin: 0; }
.app { display: flex; min-height: 100vh; background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; }
h1,h2,h3,h4,h5 { font-family: 'Source Serif 4', serif; margin: 0; }
.muted { color: var(--ink-light); font-size: 13px; }

/* Config gate */
.config-gate { display:flex; align-items:center; justify-content:center; min-height:100vh; width:100%; padding: 20px; }
.config-card { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 28px; max-width: 460px; width:100%; }
.config-card h2 { font-size:19px; margin-bottom: 8px; }
.config-card p { font-size: 13px; color: var(--ink-light); line-height:1.5; margin: 0 0 16px; }
.config-card label { display:block; font-size:12.5px; color: var(--ink-light); margin-bottom: 4px; margin-top:12px; }
.config-card input { width:100%; padding: 9px 10px; border:1px solid var(--line); border-radius:7px; font-family:'IBM Plex Mono', monospace; font-size:12.5px; background: var(--paper); color:var(--ink); }

/* Sidebar */
.sidebar { width: 260px; flex-shrink: 0; background: var(--paper-2); border-right: 1px solid var(--line); padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark { width: 10px; height: 32px; background: linear-gradient(var(--ors), var(--srs)); border-radius: 2px; flex-shrink: 0; }
.brand h1 { font-size: 19px; font-weight: 600; }
.brand p { margin: 2px 0 0; font-size: 11.5px; color: var(--ink-light); }
.patient-list { display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1; }
.empty-hint { line-height: 1.5; }
.patient-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 8px; border: none; background: transparent; cursor: pointer; text-align: left; font-family: inherit; font-size: 13.5px; color: var(--ink); width: 100%; }
.patient-item:hover { background: var(--paper); }
.patient-item.active { background: var(--ink); color: var(--paper-2); }
.patient-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align:left; }
.chevron { opacity: 0.4; }
.new-patient-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.new-patient-card input { padding: 8px 10px; border: 1px solid var(--line); border-radius: 7px; font-family: inherit; font-size: 13px; background: var(--paper-2); color: var(--ink); width:100%; }
.age-group-select { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { padding: 5px 10px; border-radius: 20px; border: 1px solid var(--line); background: var(--paper-2); font-size: 12px; cursor: pointer; color: var(--ink-light); font-family: inherit; }
.chip-active { background: var(--ink); color: var(--paper-2); border-color: var(--ink); }
.btn { display: inline-flex; align-items: center; gap: 6px; justify-content: center; padding: 8px 14px; border-radius: 8px; border: 1px solid transparent; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn-primary { background: var(--ink); color: var(--paper-2); }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
.btn-ghost:hover { background: var(--paper); }
.btn-icon { padding: 6px; border: none; background: transparent; color: var(--ink-light); cursor: pointer; border-radius: 6px; }
.btn-icon:hover { background: var(--paper); color: var(--alert); }
.row-gap { display: flex; gap: 8px; }

/* Main */
.main { flex: 1; padding: 28px 40px; overflow-y: auto; max-width: 980px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px; color: var(--ink-light); padding: 80px 20px; }
.empty-state.small { padding: 30px 0; align-items: flex-start; text-align: left; }
.empty-state h2 { color: var(--ink); font-size: 20px; }
.patient-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 18px; margin-bottom: 18px; border-bottom: 1px solid var(--line); }
.patient-header h2 { font-size: 24px; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.confirm-inline { font-size: 12.5px; display: flex; align-items: center; gap: 8px; color: var(--ink-light); }
.link { background: none; border: none; color: var(--ink-light); text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 12.5px; }
.link-danger { background: none; border: none; color: var(--alert); text-decoration: underline; cursor: pointer; font-family: inherit; font-size: 12.5px; font-weight: 600; }
.banner { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; line-height: 1.5; }
.banner-alert, .banner-error { background: #F3E4DD; color: var(--alert); border: 1px solid #E3C4B7; }
.banner p { margin: 2px 0; }
.banner-body { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.banner-section p { margin: 0 0 6px; }
.item-breakdown { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 6px 14px; }
.item-breakdown li { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink); background: rgba(255,255,255,0.5); padding: 3px 9px; border-radius: 20px; }
.item-breakdown li span { color: var(--ink-light); }
.item-breakdown li.flagged { background: var(--alert); color: #fff; }
.item-breakdown li.flagged span { color: #F3E4DD; }
.form-card, .chart-card, .table-card { background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.form-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.form-card-header h3 { font-size: 15px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
.date-input { font-family: 'IBM Plex Mono', monospace; font-size: 13px; border: 1px solid var(--line); border-radius: 6px; padding: 3px 6px; background: var(--paper); color: var(--ink); }
.instrument-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
.instrument-col h4 { font-size: 14px; margin-bottom: 12px; font-weight: 600; }
.instrument-item { margin-bottom: 16px; }
.item-label { font-size: 13px; margin: 0 0 6px; display:flex; justify-content:space-between; }
.item-hint { color: var(--ink-light); font-weight: 400; font-size: 11.5px; }
.item-val { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
.vas-input { width: 100%; height: 20px; cursor: pointer; }
.vas-labels { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--ink-light); margin-top:2px; }
.note-label { display: block; font-size: 12.5px; color: var(--ink-light); margin-top: 4px; }
.note-label textarea { width: 100%; margin-top: 6px; font-family: inherit; font-size: 13px; padding: 10px; border: 1px solid var(--line); border-radius: 8px; resize: vertical; background: var(--paper); color: var(--ink); }
.form-footer { margin-top: 16px; }
.chart-card h3, .table-card h3 { font-size: 15px; margin-bottom: 12px; font-weight: 500; }
.chart-caption { font-size: 11px; color: var(--ink-light); margin: 6px 0 0; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; font-weight: 500; color: var(--ink-light); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; padding: 6px 8px; border-bottom: 1px solid var(--line); }
tbody td { padding: 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
tbody tr:last-child td { border-bottom: none; }
.td-icon { margin-right: 5px; }
.flagged { color: var(--alert); font-weight: 600; }
.note-cell { color: var(--ink-light); max-width: 260px; }
.row-clickable { cursor: pointer; }
.row-clickable:hover { background: var(--paper); }
.row-open { background: var(--paper); }
.expand-cell { width: 18px; }
.expand-chevron { display:inline-block; color: var(--ink-light); transition: transform 0.15s ease; }
.expand-chevron.rotated { transform: rotate(90deg); }
.detail-row td { padding: 0 8px 16px; border-bottom: 1px solid var(--line); background: var(--paper); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding-top: 10px; }
.detail-col h5 { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 600; margin: 0 0 8px; }
.item-breakdown-detail { list-style:none; margin:0; padding:0; display:flex; flex-direction: column; gap: 6px; }
.item-breakdown-detail li { display: grid; grid-template-columns: 108px 1fr 32px; align-items: center; gap: 8px; }
.item-breakdown-detail li.flagged span, .item-breakdown-detail li.flagged strong { color: var(--alert); }
.mini-bar-wrap { height: 5px; background: var(--line); border-radius: 4px; overflow: hidden; }
.mini-bar { height: 100%; border-radius: 4px; }
.detail-note { font-size: 12.5px; color: var(--ink-light); margin: 12px 0 0; }
.spinner-text { font-size: 13px; color: var(--ink-light); }
@media (max-width: 800px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--line); }
  .main { padding: 20px; }
  .instrument-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* =========================================================================
   CONFIGURACIÓN — rellena esto tras desplegar tu Google Apps Script (Code.gs)
   ========================================================================= */
const CONFIG = {
  SCRIPT_URL: "",      // pega aquí tu URL de despliegue, algo como https://script.google.com/macros/s/XXXX/exec
  PASSPHRASE: ""        // la misma que pusiste en la constante PASSPHRASE de Code.gs
};
/* ========================================================================= */

const ORS_ITEMS = [
  { key: "individual", label: "Bienestar personal", hint: "Cómo me siento yo (a nivel personal)" },
  { key: "interpersonal", label: "Relaciones cercanas", hint: "Familia, pareja, amistades íntimas" },
  { key: "social", label: "Ámbito social", hint: "Trabajo, escuela, amistades" },
  { key: "overall", label: "General", hint: "Sensación general de bienestar" },
];
const SRS_ITEMS = [
  { key: "relationship", label: "Relación", hint: "Sentirse escuchado, comprendido y respetado" },
  { key: "goals", label: "Objetivos y temas", hint: "Trabajar y hablar de lo que quería" },
  { key: "approach", label: "Enfoque o método", hint: "El enfoque del terapeuta encaja conmigo" },
  { key: "overall", label: "General", hint: "Valoración general de la sesión" },
];
const ORS_CUTOFF = { adult: 25, adolescent: 28, child: 32 };
const SRS_TOTAL_CUTOFF = 36;
const SRS_ITEM_CUTOFF = 9;
const AGE_GROUPS = [
  { key: "adult", label: "Adulto" },
  { key: "adolescent", label: "Adolescente" },
  { key: "child", label: "Niño/a" },
];
const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

let state = {
  configured: !!(CONFIG.SCRIPT_URL && CONFIG.PASSPHRASE),
  patients: [],
  sessions: {},
  selectedId: null,
  expandedId: null,
  showForm: false,
  showNewPatient: false,
  newPatientName: "",
  newPatientAge: "adult",
  confirmDeletePatient: null,
  confirmDeleteSession: null,
  loading: true,
  error: "",
  form: blankForm(),
};

function blankForm() {
  return {
    date: new Date().toISOString().slice(0, 10),
    ors: { individual: 5, interpersonal: 5, social: 5, overall: 5 },
    srs: { relationship: 5, goals: 5, approach: 5, overall: 5 },
    note: "",
  };
}

// ---------------------------------------------------------------------------
// Comunicación con el backend (Google Apps Script)
// ---------------------------------------------------------------------------
async function api(action, payload) {
  const res = await fetch(CONFIG.SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // evita preflight CORS
    body: JSON.stringify({ action, passphrase: CONFIG.PASSPHRASE, payload: payload || {} }),
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "error_desconocido");
  return json.data;
}

async function loadPatients() {
  state.loading = true; state.error = ""; render();
  try {
    state.patients = await api("listPatients");
  } catch (err) {
    state.error = "No se pudo conectar con tu hoja de datos. Revisa la URL/contraseña. (" + err.message + ")";
  }
  state.loading = false; render();
}

async function loadSessions(patientId) {
  if (state.sessions[patientId]) return;
  try {
    state.sessions[patientId] = await api("listSessions", { patientId });
  } catch (err) {
    state.error = "No se pudieron cargar las sesiones. (" + err.message + ")";
    state.sessions[patientId] = [];
  }
  render();
}

// ---------------------------------------------------------------------------
// Acciones
// ---------------------------------------------------------------------------
async function addPatient() {
  const name = state.newPatientName.trim();
  if (!name) return;
  const patient = { id: uid(), name, ageGroup: state.newPatientAge };
  const list = [...state.patients, patient];
  state.patients = list;
  state.sessions[patient.id] = [];
  state.newPatientName = ""; state.newPatientAge = "adult"; state.showNewPatient = false;
  state.selectedId = patient.id; state.expandedId = null;
  render();
  try { await api("savePatients", list); }
  catch (err) { state.error = "No se pudo guardar el paciente. (" + err.message + ")"; render(); }
}

async function deletePatient(id) {
  state.patients = state.patients.filter((p) => p.id !== id);
  delete state.sessions[id];
  if (state.selectedId === id) state.selectedId = null;
  state.confirmDeletePatient = null;
  render();
  try { await api("deletePatientEverywhere", { patientId: id }); }
  catch (err) { state.error = "No se pudo eliminar en la hoja remota. (" + err.message + ")"; render(); }
}

async function addSession() {
  const sessions = state.sessions[state.selectedId] || [];
  const entry = {
    id: uid(),
    sessionNumber: sessions.length + 1,
    date: state.form.date,
    ors: state.form.ors,
    srs: state.form.srs,
    note: state.form.note,
  };
  const list = [...sessions, entry];
  state.sessions[state.selectedId] = list;
  state.form = blankForm();
  state.showForm = false;
  render();
  try { await api("saveSessions", { patientId: state.selectedId, sessions: list }); }
  catch (err) { state.error = "No se pudo guardar la sesión. (" + err.message + ")"; render(); }
}

async function deleteSession(id) {
  const list = (state.sessions[state.selectedId] || [])
    .filter((s) => s.id !== id)
    .map((s, i) => ({ ...s, sessionNumber: i + 1 }));
  state.sessions[state.selectedId] = list;
  state.confirmDeleteSession = null;
  render();
  try { await api("saveSessions", { patientId: state.selectedId, sessions: list }); }
  catch (err) { state.error = "No se pudo eliminar la sesión remotamente. (" + err.message + ")"; render(); }
}

// ---------------------------------------------------------------------------
// Render
// ---------------------------------------------------------------------------
let chartInstance = null;

function render() {
  const root = document.getElementById("root");
  if (!state.configured) {
    root.innerHTML = configGateHTML();
    return;
  }
  root.innerHTML = appHTML();
  attachEvents();
  if (state.selectedId) drawChart();
}

function configGateHTML() {
  return `
    <div class="config-gate">
      <div class="config-card">
        <h2>Falta configurar la conexión</h2>
        <p>Antes de usar la app, despliega el backend (Code.gs) en tu Google Apps Script y pega aquí la URL y la contraseña que definiste. Esto solo se hace una vez por archivo: puedes rellenarlo ahora y guardar este HTML ya configurado para copiarlo a cualquier ordenador.</p>
        <label>URL de tu Web App (Apps Script)</label>
        <input id="cfg-url" placeholder="https://script.google.com/macros/s/XXXX/exec" value="${esc(CONFIG.SCRIPT_URL)}" />
        <label>Contraseña (la misma que en Code.gs)</label>
        <input id="cfg-pass" placeholder="Tu contraseña" value="${esc(CONFIG.PASSPHRASE)}" />
        <div class="row-gap" style="margin-top:18px;">
          <button class="btn btn-primary" id="cfg-save">Conectar</button>
        </div>
      </div>
    </div>`;
}

function appHTML() {
  const patient = state.patients.find((p) => p.id === state.selectedId) || null;
  const sessions = (state.selectedId && state.sessions[state.selectedId]) || [];
  const orsCutoff = patient ? ORS_CUTOFF[patient.ageGroup] : 25;

  const rows = [...sessions].reverse().map((s) => {
    const orsTotal = Object.values(s.ors).reduce((a, b) => a + b, 0);
    const srsTotal = Object.values(s.srs).reduce((a, b) => a + b, 0);
    const srsItemFlag = Object.values(s.srs).some((v) => v < SRS_ITEM_CUTOFF);
    return { ...s, orsTotal, srsTotal, orsFlag: orsTotal < orsCutoff, srsFlag: srsTotal < SRS_TOTAL_CUTOFF || srsItemFlag };
  });
  const latest = rows[0];

  return `
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div><h1>Bitácora</h1><p>Alianza terapéutica &amp; bienestar</p></div>
      </div>
      <div class="patient-list">
        ${state.loading ? `<p class="muted">Cargando…</p>` : ""}
        ${!state.loading && state.patients.length === 0 ? `<p class="muted empty-hint">Aún no hay pacientes. Añade el primero para empezar a registrar sesiones.</p>` : ""}
        ${state.patients.map((p) => `
          <button class="patient-item ${state.selectedId === p.id ? "active" : ""}" data-select-patient="${p.id}">
            <span>👤</span><span class="patient-item-name">${esc(p.name)}</span><span class="chevron">›</span>
          </button>`).join("")}
      </div>
      ${!state.showNewPatient ? `
        <button class="btn btn-ghost" id="btn-show-new-patient" style="justify-content:flex-start;">+ Añadir paciente</button>
      ` : `
        <div class="new-patient-card">
          <input id="new-patient-name" placeholder="Nombre del paciente" value="${esc(state.newPatientName)}" />
          <div class="age-group-select">
            ${AGE_GROUPS.map((g) => `<button class="chip ${state.newPatientAge === g.key ? "chip-active" : ""}" data-age-group="${g.key}">${g.label}</button>`).join("")}
          </div>
          <div class="row-gap">
            <button class="btn btn-primary" id="btn-save-new-patient">Guardar</button>
            <button class="btn btn-ghost" id="btn-cancel-new-patient">Cancelar</button>
          </div>
        </div>`}
    </aside>

    <main class="main">
      ${state.error ? `<div class="banner banner-error">⚠️ ${esc(state.error)}</div>` : ""}

      ${!patient ? `
        <div class="empty-state">
          <h2>Selecciona o añade un paciente</h2>
          <p>Cada paciente tiene su propio historial de ORS y SRS, con gráfico de evolución, guardado en tu Google Sheet.</p>
        </div>` : `
        <header class="patient-header">
          <div>
            <h2>${esc(patient.name)}</h2>
            <p class="muted">${AGE_GROUPS.find((g) => g.key === patient.ageGroup)?.label || ""} · ${sessions.length} sesión${sessions.length === 1 ? "" : "es"} registrada${sessions.length === 1 ? "" : "s"}</p>
          </div>
          <div class="header-actions">
            <button class="btn btn-primary" id="btn-new-session">+ Nueva sesión</button>
            ${state.confirmDeletePatient === patient.id ? `
              <span class="confirm-inline">¿Eliminar paciente y su historial?
                <button class="link-danger" id="btn-confirm-delete-patient">Sí, eliminar</button>
                <button class="link" id="btn-cancel-delete-patient">Cancelar</button>
              </span>` : `
              <button class="btn btn-icon" id="btn-ask-delete-patient">🗑</button>`}
          </div>
        </header>

        ${latest && (latest.orsFlag || latest.srsFlag) ? `
          <div class="banner banner-alert">
            ⚠️
            <div class="banner-body">
              ${latest.orsFlag ? `
                <div class="banner-section">
                  <p>El <strong>ORS</strong> de la última sesión (${latest.orsTotal.toFixed(1)}) está por debajo del punto de corte (${orsCutoff}). Puede indicar malestar significativo a comentar.</p>
                  <ul class="item-breakdown">
                    ${ORS_ITEMS.map((item) => `<li><span>${item.label}</span><strong>${latest.ors[item.key].toFixed(1)}</strong></li>`).join("")}
                  </ul>
                </div>` : ""}
              ${latest.srsFlag ? `
                <div class="banner-section">
                  <p>El <strong>SRS</strong> de la última sesión (${latest.srsTotal.toFixed(1)}) sugiere revisar la alianza terapéutica en la próxima sesión.</p>
                  <ul class="item-breakdown">
                    ${SRS_ITEMS.map((item) => `<li class="${latest.srs[item.key] < SRS_ITEM_CUTOFF ? "flagged" : ""}"><span>${item.label}</span><strong>${latest.srs[item.key].toFixed(1)}</strong></li>`).join("")}
                  </ul>
                </div>` : ""}
            </div>
          </div>` : ""}

        ${state.showForm ? formHTML(sessions.length) : ""}

        ${sessions.length > 0 ? `
          <div class="chart-card">
            <h3>Evolución</h3>
            <canvas id="evolution-chart" height="90"></canvas>
            <p class="chart-caption">Líneas discontinuas: puntos de corte (ORS ${orsCutoff} · SRS ${SRS_TOTAL_CUTOFF})</p>
          </div>` : ""}

        ${sessions.length > 0 ? `
          <div class="table-card">
            <h3>Historial de sesiones</h3>
            <table>
              <thead><tr><th></th><th>#</th><th>Fecha</th><th>ORS</th><th>SRS</th><th>Notas</th><th></th></tr></thead>
              <tbody>
                ${rows.map((r) => rowHTML(r)).join("")}
              </tbody>
            </table>
          </div>` : ""}

        ${sessions.length === 0 && !state.showForm ? `
          <div class="empty-state small"><p>Todavía no hay sesiones registradas para ${esc(patient.name)}.</p></div>` : ""}
      `}
    </main>
  </div>`;
}

function formHTML(existingCount) {
  const f = state.form;
  return `
    <div class="form-card">
      <div class="form-card-header">
        <h3>Sesión #${existingCount + 1} · <input type="date" id="form-date" class="date-input" value="${f.date}" /></h3>
        <button class="btn btn-icon" id="btn-cancel-form">✕</button>
      </div>
      <div class="instrument-grid">
        <div class="instrument-col">
          <h4 style="color:var(--ors)">ORS · resultado (inicio de sesión)</h4>
          ${ORS_ITEMS.map((item) => vasHTML("ors", item, f.ors[item.key], "var(--ors)")).join("")}
        </div>
        <div class="instrument-col">
          <h4 style="color:var(--srs)">SRS · alianza (fin de sesión)</h4>
          ${SRS_ITEMS.map((item) => vasHTML("srs", item, f.srs[item.key], "var(--srs)")).join("")}
        </div>
      </div>
      <label class="note-label">Notas de la sesión (opcional)
        <textarea id="form-note" rows="2" placeholder="Qué comentó el paciente, qué se acordó revisar la próxima sesión…">${esc(f.note)}</textarea>
      </label>
      <div class="row-gap form-footer">
        <button class="btn btn-primary" id="btn-save-session">Guardar sesión</button>
        <button class="btn btn-ghost" id="btn-cancel-form-2">Cancelar</button>
      </div>
    </div>`;
}

function vasHTML(group, item, value, accent) {
  return `
    <div class="instrument-item">
      <p class="item-label"><span>${item.label} <span class="item-hint">— ${item.hint}</span></span><span class="item-val" id="val-${group}-${item.key}">${value.toFixed(1)}</span></p>
      <input type="range" class="vas-input" min="0" max="10" step="0.5" value="${value}" style="accent-color:${accent}" data-vas="${group}.${item.key}" />
      <div class="vas-labels"><span>${group === "ors" ? "Muy bajo" : "En desacuerdo"}</span><span>${group === "ors" ? "Muy bien" : "De acuerdo"}</span></div>
    </div>`;
}

function rowHTML(r) {
  const isOpen = state.expandedId === r.id;
  const detail = isOpen ? `
    <tr class="detail-row"><td colspan="7">
      <div class="detail-grid">
        <div class="detail-col">
          <h5 style="color:var(--ors)">ORS · ${r.orsTotal.toFixed(1)} / 40</h5>
          <ul class="item-breakdown-detail">
            ${ORS_ITEMS.map((item) => `<li><span>${item.label}</span><div class="mini-bar-wrap"><div class="mini-bar" style="width:${(r.ors[item.key]/10)*100}%;background:var(--ors)"></div></div><strong>${r.ors[item.key].toFixed(1)}</strong></li>`).join("")}
          </ul>
        </div>
        <div class="detail-col">
          <h5 style="color:var(--srs)">SRS · ${r.srsTotal.toFixed(1)} / 40</h5>
          <ul class="item-breakdown-detail">
            ${SRS_ITEMS.map((item) => `<li class="${r.srs[item.key] < SRS_ITEM_CUTOFF ? "flagged" : ""}"><span>${item.label}</span><div class="mini-bar-wrap"><div class="mini-bar" style="width:${(r.srs[item.key]/10)*100}%;background:var(--srs)"></div></div><strong>${r.srs[item.key].toFixed(1)}</strong></li>`).join("")}
          </ul>
        </div>
      </div>
      ${r.note ? `<p class="detail-note">📝 ${esc(r.note)}</p>` : ""}
    </td></tr>` : "";

  return `
    <tr class="row-clickable ${isOpen ? "row-open" : ""}" data-toggle-row="${r.id}">
      <td class="expand-cell"><span class="expand-chevron ${isOpen ? "rotated" : ""}">›</span></td>
      <td>${r.sessionNumber}</td>
      <td>${r.date}</td>
      <td class="${r.orsFlag ? "flagged" : ""}">${r.orsTotal.toFixed(1)}</td>
      <td class="${r.srsFlag ? "flagged" : ""}">${r.srsTotal.toFixed(1)}</td>
      <td class="note-cell">${esc(r.note) || "—"}</td>
      <td data-stop-row-toggle="1">
        ${state.confirmDeleteSession === r.id ? `
          <span class="confirm-inline">
            <button class="link-danger" data-confirm-delete-session="${r.id}">Sí</button>
            <button class="link" data-cancel-delete-session="1">No</button>
          </span>` : `<button class="btn btn-icon" data-ask-delete-session="${r.id}">🗑</button>`}
      </td>
    </tr>
    ${detail}`;
}

function drawChart() {
  const canvas = document.getElementById("evolution-chart");
  if (!canvas) return;
  const patient = state.patients.find((p) => p.id === state.selectedId);
  const sessions = state.sessions[state.selectedId] || [];
  if (!patient || sessions.length === 0) return;
  const orsCutoff = ORS_CUTOFF[patient.ageGroup];
  const labels = sessions.map((s) => s.sessionNumber);
  const orsData = sessions.map((s) => Object.values(s.ors).reduce((a, b) => a + b, 0));
  const srsData = sessions.map((s) => Object.values(s.srs).reduce((a, b) => a + b, 0));

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "ORS", data: orsData, borderColor: "#8A6A3F", backgroundColor: "#8A6A3F", tension: 0.25, pointRadius: 3 },
        { label: "SRS", data: srsData, borderColor: "#4E6E64", backgroundColor: "#4E6E64", tension: 0.25, pointRadius: 3 },
        { label: "Corte ORS", data: labels.map(() => orsCutoff), borderColor: "#8A6A3F", borderDash: [5,5], pointRadius: 0, borderWidth: 1 },
        { label: "Corte SRS", data: labels.map(() => 36), borderColor: "#4E6E64", borderDash: [5,5], pointRadius: 0, borderWidth: 1 },
      ],
    },
    options: {
      responsive: true,
      scales: { y: { min: 0, max: 40, grid: { color: "#D8D2C2" } }, x: { title: { display: true, text: "Sesión" }, grid: { display: false } } },
      plugins: { legend: { labels: { font: { size: 11 } } } },
    },
  });
}

// ---------------------------------------------------------------------------
// Delegación de eventos
// ---------------------------------------------------------------------------
function attachEvents() {
  const root = document.getElementById("root");

  root.querySelectorAll("[data-select-patient]").forEach((el) =>
    el.addEventListener("click", () => {
      state.selectedId = el.dataset.selectPatient;
      state.expandedId = null;
      render();
      loadSessions(state.selectedId);
    })
  );

  const btnShowNew = document.getElementById("btn-show-new-patient");
  if (btnShowNew) btnShowNew.addEventListener("click", () => { state.showNewPatient = true; render(); document.getElementById("new-patient-name")?.focus(); });

  const newNameInput = document.getElementById("new-patient-name");
  if (newNameInput) {
    newNameInput.addEventListener("input", (e) => { state.newPatientName = e.target.value; });
    newNameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addPatient(); });
  }
  root.querySelectorAll("[data-age-group]").forEach((el) =>
    el.addEventListener("click", () => { state.newPatientAge = el.dataset.ageGroup; render(); document.getElementById("new-patient-name")?.focus(); })
  );
  const btnSaveNewPatient = document.getElementById("btn-save-new-patient");
  if (btnSaveNewPatient) btnSaveNewPatient.addEventListener("click", addPatient);
  const btnCancelNewPatient = document.getElementById("btn-cancel-new-patient");
  if (btnCancelNewPatient) btnCancelNewPatient.addEventListener("click", () => { state.showNewPatient = false; state.newPatientName = ""; render(); });

  const btnNewSession = document.getElementById("btn-new-session");
  if (btnNewSession) btnNewSession.addEventListener("click", () => { state.form = blankForm(); state.showForm = true; render(); });
  const btnCancelForm = document.getElementById("btn-cancel-form");
  const btnCancelForm2 = document.getElementById("btn-cancel-form-2");
  [btnCancelForm, btnCancelForm2].forEach((b) => b && b.addEventListener("click", () => { state.showForm = false; render(); }));

  const formDate = document.getElementById("form-date");
  if (formDate) formDate.addEventListener("change", (e) => { state.form.date = e.target.value; });
  const formNote = document.getElementById("form-note");
  if (formNote) formNote.addEventListener("input", (e) => { state.form.note = e.target.value; });

  root.querySelectorAll("[data-vas]").forEach((el) =>
    el.addEventListener("input", (e) => {
      const [group, key] = el.dataset.vas.split(".");
      const v = parseFloat(e.target.value);
      state.form[group][key] = v;
      const label = document.getElementById(`val-${group}-${key}`);
      if (label) label.textContent = v.toFixed(1);
    })
  );
  const btnSaveSession = document.getElementById("btn-save-session");
  if (btnSaveSession) btnSaveSession.addEventListener("click", addSession);

  const btnAskDeletePatient = document.getElementById("btn-ask-delete-patient");
  if (btnAskDeletePatient) btnAskDeletePatient.addEventListener("click", () => { state.confirmDeletePatient = state.selectedId; render(); });
  const btnConfirmDeletePatient = document.getElementById("btn-confirm-delete-patient");
  if (btnConfirmDeletePatient) btnConfirmDeletePatient.addEventListener("click", () => deletePatient(state.selectedId));
  const btnCancelDeletePatient = document.getElementById("btn-cancel-delete-patient");
  if (btnCancelDeletePatient) btnCancelDeletePatient.addEventListener("click", () => { state.confirmDeletePatient = null; render(); });

  root.querySelectorAll("[data-toggle-row]").forEach((el) =>
    el.addEventListener("click", (e) => {
      if (e.target.closest("[data-stop-row-toggle]")) return;
      const id = el.dataset.toggleRow;
      state.expandedId = state.expandedId === id ? null : id;
      render();
    })
  );
  root.querySelectorAll("[data-ask-delete-session]").forEach((el) =>
    el.addEventListener("click", (e) => { e.stopPropagation(); state.confirmDeleteSession = el.dataset.askDeleteSession; render(); })
  );
  root.querySelectorAll("[data-confirm-delete-session]").forEach((el) =>
    el.addEventListener("click", (e) => { e.stopPropagation(); deleteSession(el.dataset.confirmDeleteSession); })
  );
  root.querySelectorAll("[data-cancel-delete-session]").forEach((el) =>
    el.addEventListener("click", (e) => { e.stopPropagation(); state.confirmDeleteSession = null; render(); })
  );
}

// ---------------------------------------------------------------------------
// Arranque
// ---------------------------------------------------------------------------
function bootConfigGate() {
  const btn = document.getElementById("cfg-save");
  if (!btn) return;
  btn.addEventListener("click", () => {
    CONFIG.SCRIPT_URL = document.getElementById("cfg-url").value.trim();
    CONFIG.PASSPHRASE = document.getElementById("cfg-pass").value.trim();
    if (!CONFIG.SCRIPT_URL || !CONFIG.PASSPHRASE) return;
    state.configured = true;
    render();
    loadPatients();
  });
}

render();
if (!state.configured) bootConfigGate();
else loadPatients();
</script>
</body>
</html>
